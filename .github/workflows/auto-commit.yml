name: Auto Commit - Daily Contribution Bot

on:
  schedule:
    # Chạy mỗi ngày vào lúc 23:45 UTC (tức 06:45 sáng giờ Việt Nam)
    - cron: '45 23 * * *'
  workflow_dispatch: # Cho phép kích hoạt chạy thủ công qua giao diện GitHub Actions

jobs:
  commit:
    runs-on: ubuntu-latest
    # Yêu cầu quyền ghi (write) để đẩy code lên repo
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delay Ngẫu Nhiên (Giúp lịch sử commit tự nhiên)
        # Chờ ngẫu nhiên từ 0 đến 45 phút (2700 giây) để thời gian commit thay đổi mỗi ngày, tránh bị phát hiện bot rập khuôn
        run: |
          DELAY=$((RANDOM % 2700))
          echo "Đang chờ ngẫu nhiên trong $DELAY giây..."
          sleep $DELAY

      - name: Cập nhật File Log
        run: |
          echo "Last contribution check: $(date)" > LAST_UPDATED.txt
          echo "Automated contribution update by tanbaycu" >> LAST_UPDATED.txt

      - name: Commit và Push Thay Đổi (Tạo đúng 27 commits)
        run: |
          # Cấu hình Git với thông tin tác giả tanbaycu
          git config --global user.name "tanbaycu"
          git config --global user.email "mnew20128@gmail.com"
          
          # Vòng lặp tạo đúng 27 commit riêng biệt
          for i in {1..27}
          do
            echo "Contribution $i of 27 - Timestamp: $(date)" > LAST_UPDATED.txt
            git add LAST_UPDATED.txt
            git commit -m "chore: automated daily update $i/27 by tanbaycu"
            # Nghỉ 1 giây để thời gian các commit khác nhau một chút
            sleep 1
          done
          
          # Đẩy toàn bộ 27 commits lên GitHub trong 1 lần push duy nhất
          git push origin main
